version: '3.9'
services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quizarena
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
  redis:
    image: redis:7
    ports:
      - '6379:6379'
    command: redis-server --save 60 1 --appendonly yes
volumes:
  postgres_data:
